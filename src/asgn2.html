<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>CSE 160 Asgn2</title>
  <!-- <style>
    #angle {
      accent-color: yellow;
    }
  </style> -->
</head>

<body onload="main()">
  <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
  </canvas>

  <br> <br>

  <div>
    Animation:
    <button type="button" id="on">ON</button>
    <button type="button" id="off">OFF</button>
  </div>

  <br>
  
  <div>
    Wings <input type="range" id="wing1" min="0" max="60" value="0">
  </div>

  <div>
    Wings Middle <input type="range" id="wing2" min="0" max="20" value="0">
  </div>

  <div>
    Wings Edge <input type="range" id="wing3" min="0" max="20" value="0">
  </div>

  <br>

  <div>
    Camera Angle <input type="range" id="angle" min="-180" max="180" value="0">
  </div>

  <script src="../lib/webgl-utils.js"></script>
  <script src="../lib/webgl-debug.js"></script>
  <script src="../lib/cuon-utils.js"></script>
  <script src="../lib/cuon-matrix-cse160.js"></script>
  <script src="Triangle.js"></script>
  <script src="Cube.js"></script>
  <script src="asgn2.js"></script>
</body>

</html>
